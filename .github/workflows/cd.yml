name: CD

on:
  push:
    branches: [main]

jobs:
  Deploy:
    name: Deploy Application
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Run production script
        run: chmod +x scripts/buildprod.sh && ./scripts/buildprod.sh
